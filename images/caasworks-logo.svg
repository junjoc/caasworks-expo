<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488FF"/>
      <stop offset="100%" style="stop-color:#1a5ccc"/>
    </linearGradient>
  </defs>
  <!-- Hexagon icon -->
  <g transform="translate(30,30) scale(0.85)">
    <path d="M-16,-28 L16,-28 L28,0 L16,28 L-16,28 L-28,0 Z" fill="none" stroke="url(#logoGrad)" stroke-width="3.5"/>
    <path d="M-8,-18 L-14,-6 L-14,6 L-8,18" fill="none" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-2,-18 L-2,18" fill="none" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M6,-18 L6,0 L14,0" fill="none" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M6,0 L6,18 L14,18" fill="none" stroke="url(#logoGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- CaasWorks text -->
  <text x="65" y="40" font-family="'Segoe UI','Roboto','Helvetica Neue',sans-serif" font-size="30" font-weight="700" fill="#2979FF" letter-spacing="1">CaasWorks</text>
